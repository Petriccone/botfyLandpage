<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#3a08a2"/>
    </linearGradient>
    <!-- Subtle inner highlight -->
    <radialGradient id="shine" cx="30%" cy="20%" r="60%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <rect width="64" height="64" rx="16" fill="url(#shine)"/>

  <!-- Lowercase "b" — Bricolage Grotesque style, white -->
  <text
    x="10"
    y="50"
    font-family="'Bricolage Grotesque', 'Arial Rounded MT Bold', Arial, sans-serif"
    font-size="44"
    font-weight="800"
    fill="white"
    letter-spacing="-1"
  >b</text>

  <!-- Circle dot — top right corner accent -->
  <circle cx="51" cy="13" r="6" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
</svg>
